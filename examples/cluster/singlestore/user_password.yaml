apiVersion: singlestore.sql.crossplane.io/v1alpha1
kind: User
metadata:
  name: example-password-user
spec:
  forProvider:
    # authPlugin defaults to "password"
    authPlugin: password
    passwordSecretRef:
      name: example-pw
      namespace: default
      key: password
    requireSSL: true
  writeConnectionSecretToRef:
    name: example-connection-secret
    namespace: default
